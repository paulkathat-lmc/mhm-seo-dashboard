<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Home Movers - SEO Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #3b82f6;
            --green: #22c55e;
            --red: #ef4444;
            --orange: #f59e0b;
            --header-bg: #1a365d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 { font-size: 1.5rem; font-weight: 700; }
        .header .subtitle { color: var(--muted); font-size: 0.875rem; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .date-badge {
            background: var(--accent);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .live-badge {
            background: var(--green);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .last-updated {
            color: var(--muted);
            font-size: 0.75rem;
        }

        /* Two-column summary layout matching the Google Sheet */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .summary-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .summary-table {
            width: 100%;
            border-collapse: collapse;
        }
        .summary-table th,
        .summary-table td {
            padding: 10px 16px;
            font-size: 0.875rem;
            border-bottom: 1px solid var(--border);
        }
        .summary-table thead th {
            background: var(--header-bg);
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            text-align: left;
        }
        .summary-table tbody tr:last-child td { border-bottom: none; }
        .summary-table .metric-name {
            font-weight: 600;
            color: var(--text);
        }
        .summary-table .metric-value {
            text-align: right;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        .summary-table .metric-change {
            text-align: right;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .change-up { color: var(--green); }
        .change-down { color: var(--red); }
        .change-neutral { color: var(--muted); }
        /* For position metrics, down is good (lower position = better) */
        .change-up-bad { color: var(--red); }
        .change-down-good { color: var(--green); }

        .section-header td {
            background: #334155;
            font-weight: 700 !important;
            color: var(--orange) !important;
            font-size: 0.8rem !important;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 8px 16px !important;
        }

        .city-accordion {
            cursor: pointer;
            user-select: none;
        }
        .city-accordion .metric-name::before {
            content: '\25B6';
            display: inline-block;
            font-size: 0.6rem;
            margin-right: 6px;
            transition: transform 0.2s;
            vertical-align: middle;
        }
        .city-accordion.open .metric-name::before {
            transform: rotate(90deg);
        }
        .company-row {
            display: none;
        }
        .company-row.visible {
            display: table-row;
        }
        .company-row td {
            padding: 4px 16px 4px 28px !important;
            font-size: 0.78rem;
            border-bottom: 1px solid rgba(51,65,85,0.4);
        }
        .company-name {
            color: var(--muted);
            font-weight: 400;
            word-break: break-all;
        }
        .company-name a {
            color: var(--accent);
            text-decoration: none;
        }
        .company-name a:hover { text-decoration: underline; }
        .company-pos {
            color: var(--muted);
            font-weight: 500;
        }
        .expand-all-btn {
            background: var(--header-bg);
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            float: right;
            margin: 4px 8px;
        }
        .expand-all-btn:hover { color: var(--text); border-color: var(--accent); }

        .deindexed-url td {
            padding: 6px 16px !important;
            font-size: 0.8rem;
        }
        .deindexed-url a {
            color: var(--accent);
            text-decoration: none;
            word-break: break-all;
        }
        .deindexed-url a:hover { text-decoration: underline; }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .chart-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .chart-card h3 {
            font-size: 0.9rem;
            margin-bottom: 16px;
            color: var(--muted);
        }

        /* Loading state */
        .loading-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--muted); font-size: 0.9rem; }
        .error-msg { color: var(--red); font-size: 0.9rem; text-align: center; padding: 40px; }

        /* Responsive */
        @media (max-width: 900px) {
            body { padding: 12px; }
            .summary-grid { grid-template-columns: 1fr; }
            .charts-grid { grid-template-columns: 1fr; }
        }
        @media print {
            body { background: white; color: #111; padding: 12px; }
            .summary-card, .chart-card { border: 1px solid #ccc; }
            .summary-table thead th { background: #2c5282; }
            .section-header td { background: #e2e8f0; color: #1a202c !important; }
            .live-badge { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>Mobile Home Movers - SEO Dashboard</h1>
            <div class="subtitle">localmovers.com/mobile-home-mover</div>
        </div>
        <div class="header-right">
            <span class="live-badge" id="liveBadge" style="display:none">Live</span>
            <div class="date-badge" id="dateLabel">Loading...</div>
        </div>
    </div>
    <div class="last-updated" id="lastUpdated"></div>

    <!-- Loading state -->
    <div id="loadingState" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Fetching latest data from Google Sheets...</div>
    </div>

    <!-- Dashboard content (hidden until loaded) -->
    <div id="dashboardContent" style="display:none">
        <!-- Two-column summary matching Daily Summary sheet -->
        <div class="summary-grid">
            <div class="summary-card">
                <table class="summary-table" id="kpiTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th id="kpiDate" style="text-align:right"></th>
                            <th id="kpiChange" style="text-align:right"></th>
                        </tr>
                    </thead>
                    <tbody id="kpiBody"></tbody>
                </table>
            </div>
            <div class="summary-card">
                <table class="summary-table" id="cityTable">
                    <thead>
                        <tr>
                            <th>Date <button class="expand-all-btn" id="expandAllBtn">Expand All</button></th>
                            <th id="cityDate" style="text-align:right"></th>
                            <th id="cityChange" style="text-align:right"></th>
                        </tr>
                    </thead>
                    <tbody id="cityBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Trend Charts -->
        <div class="charts-grid">
            <div class="chart-card">
                <h3>Impressions & Clicks Over Time</h3>
                <canvas id="impressionsChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Average Position Over Time</h3>
                <canvas id="positionChart"></canvas>
            </div>
        </div>
        <div class="charts-grid">
            <div class="chart-card">
                <h3>Indexed vs Not Indexed URLs</h3>
                <canvas id="indexChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>City Rankings (Lower = Better)</h3>
                <canvas id="cityChart"></canvas>
            </div>
        </div>
    </div>

    <script>
    // ============ GOOGLE SHEETS CONFIG ============
    const SHEET_ID = '1B0PWzhPANx2wc4y6azyvsLZtLnkBFS-oud_lv3eknYs';
    const SHEET_NAME = 'Summary Master';

    // ============ GOOGLE SHEETS FETCHER ============
    function getCellStr(cell) {
        if (!cell) return '';
        if (cell.f) return String(cell.f);
        if (cell.v !== null && cell.v !== undefined) return String(cell.v);
        return '';
    }

    function getCellNum(cell) {
        if (!cell) return 0;
        if (typeof cell.v === 'number') return cell.v;
        const str = getCellStr(cell);
        const match = str.match(/([\d.]+)/);
        return match ? parseFloat(match[0]) : 0;
    }

    function convertDate(mmddyyyy) {
        // "03/26/2026" or "3/26/2026" -> "2026-03-26"
        if (!mmddyyyy) return '';
        const parts = mmddyyyy.trim().split('/');
        if (parts.length === 3) {
            return `${parts[2]}-${parts[0].padStart(2, '0')}-${parts[1].padStart(2, '0')}`;
        }
        return mmddyyyy;
    }

    function extractDateFromChangeStr(str) {
        // "Change from 03/25/2026" -> "03/25/2026"
        if (!str) return '';
        const match = str.match(/(\d{1,2}\/\d{1,2}\/\d{4})/);
        return match ? match[1] : '';
    }

    function newSection(dateISO) {
        return {
            date: dateISO,
            totalUrls: 0, indexed: 0, indexedPct: 0, notIndexed: 0,
            impressions: 0, clicks: 0, avgPosition: 0,
            urlsInTop3: 0, citiesInTop20: 0, citiesAvgRank: 0,
            deindexedCount: 0, deindexedUrls: [], cities: {},
            _changeFrom: '' // raw "Change from" date string for chaining
        };
    }

    async function fetchFromGoogleSheets() {
        // Use default headers=1 so the first row becomes column labels
        // Column C label = latest date, Column D label = "Change from ..."
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
        const resp = await fetch(url);
        const text = await resp.text();
        const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\)/);
        if (!jsonStr) throw new Error('Failed to parse Google Sheets response');
        const data = JSON.parse(jsonStr[1]);
        if (data.status !== 'ok') throw new Error('Google Sheets query failed: ' + (data.errors?.[0]?.message || 'unknown'));

        const cols = data.table.cols;
        // The latest section's date is in column C's label (e.g. "03/26/2026")
        const latestDateRaw = cols[2]?.label || '';
        const latestDateISO = convertDate(latestDateRaw);
        // The "Change from" date for the latest section
        const latestChangeFrom = extractDateFromChangeStr(cols[3]?.label || '');

        return parseSheetSections(data.table.rows || [], latestDateISO, latestChangeFrom);
    }

    function parseSheetSections(rows, firstDateISO, firstChangeFrom) {
        // With headers=1, the first "Date" row is consumed as headers.
        // Data rows start with the first section's metrics immediately.
        // Subsequent sections start with "Date" rows in the data.

        const sections = [];
        // Start the first section with the date from column headers
        let current = newSection(firstDateISO);
        current._changeFrom = firstChangeFrom;

        for (const row of rows) {
            const cells = row.c || [];
            const label = getCellStr(cells[1]).trim();

            // Detect new date section
            if (label === 'Date') {
                if (current) sections.push(current);
                // This section's date = the PREVIOUS section's "Change from" date
                const prevChangeFrom = current._changeFrom;
                const myChangeFrom = extractDateFromChangeStr(getCellStr(cells[3]));
                current = newSection(convertDate(prevChangeFrom));
                current._changeFrom = myChangeFrom;
                continue;
            }

            if (!current) continue;

            // Skip section headers and blank rows
            if (label === 'Index Drop-Offs' || label === '') continue;

            // Deindexed URL rows
            const colA = getCellStr(cells[0]).trim();
            if (colA.startsWith('http')) { current.deindexedUrls.push(colA); continue; }
            if (label.startsWith('http')) { current.deindexedUrls.push(label); continue; }

            const numVal = getCellNum(cells[2]);

            // Map metric labels to properties
            if (label.includes('Total URLs')) {
                current.totalUrls = numVal;
            } else if (label.includes('Indexed') && label.includes('movers')) {
                // Value is null in gviz (text in number column), so we calculate it later
                // But try to read it anyway in case it's available
                current.indexed = numVal;
            } else if (label.includes('Not indexed')) {
                current.notIndexed = numVal;
            } else if (label.includes('Total Impressions')) {
                current.impressions = numVal;
            } else if (label.includes('Total Clicks')) {
                current.clicks = numVal;
            } else if (label === 'Average Position') {
                current.avgPosition = numVal;
            } else if (label.includes('URLs in Top 3')) {
                current.urlsInTop3 = numVal;
            } else if (label.includes('Cities in Top 20')) {
                current.citiesInTop20 = numVal;
            } else if (label.includes('Cities Average Rank')) {
                current.citiesAvgRank = numVal;
            } else if (label.includes('Count of Deindexed')) {
                current.deindexedCount = numVal;
            } else if (label.includes('Avg Pos')) {
                const cityName = label.replace(/\s*Avg\s*Pos\s*$/i, '').trim();
                current.cities[cityName] = { position: numVal, companies: [] };
                current._lastCity = cityName;
            } else if (label.match(/^\s*→\s*/)) {
                // Company sub-row beneath a city
                const companySlug = label.replace(/^\s*→\s*/, '').trim();
                const companyName = companySlug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                if (current._lastCity && current.cities[current._lastCity]) {
                    current.cities[current._lastCity].companies.push({ name: companyName, slug: companySlug, position: numVal });
                }
            }
        }

        if (current) sections.push(current);

        // Post-processing: calculate indexed if it was null (text in number column)
        sections.forEach(s => {
            if (s.indexed === 0 && s.totalUrls > 0 && s.notIndexed >= 0) {
                s.indexed = s.totalUrls - s.notIndexed;
            }
            if (s.totalUrls > 0 && s.indexed > 0) {
                s.indexedPct = Math.round(s.indexed / s.totalUrls * 1000) / 10;
            }
            // Clean up internal fields
            delete s._changeFrom;
            delete s._lastCity;
        });

        // Filter out sections with empty/invalid dates
        const valid = sections.filter(s => s.date && s.date.length >= 8 && s.totalUrls > 0);

        // Sort ascending by date (oldest first) for chart display
        valid.sort((a, b) => a.date.localeCompare(b.date));

        return { dailySummaries: valid };
    }

    // ============ HELPERS ============
    // Backward compat: cities can be { position, companies } or plain number
    function getCityPosition(val) {
        if (typeof val === 'object' && val !== null) return val.position;
        return val;
    }
    function getCityCompanies(val) {
        if (typeof val === 'object' && val !== null) return val.companies || [];
        return [];
    }

    // ============ DASHBOARD RENDERING ============
    function fmtDate(dateStr) {
        return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric' });
    }

    function changeCell(current, previous, invert) {
        const diff = current - previous;
        if (Math.abs(diff) < 0.005) return `<td class="metric-change change-neutral">\u2194\ufe0f</td>`;
        const arrow = diff > 0 ? '\u2191' : '\u2193';
        let cls;
        if (invert) {
            cls = diff < 0 ? 'change-down-good' : 'change-up-bad';
        } else {
            cls = diff > 0 ? 'change-up' : 'change-down';
        }
        const display = Math.abs(diff) >= 1 ? Math.abs(Math.round(diff)).toLocaleString() : Math.abs(diff).toFixed(2);
        return `<td class="metric-change ${cls}">${arrow} ${display}</td>`;
    }

    function renderDashboard(data) {
        const days = data.dailySummaries;
        if (!days || days.length === 0) {
            document.getElementById('loadingState').innerHTML = '<div class="error-msg">No data found in the spreadsheet.</div>';
            return;
        }

        const latest = days[days.length - 1];
        const prev = days.length >= 2 ? days[days.length - 2] : latest;

        // Show content, hide loading
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('dashboardContent').style.display = 'block';
        document.getElementById('liveBadge').style.display = 'inline-block';

        // Header
        document.getElementById('dateLabel').textContent =
            `Report: ${new Date(latest.date + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;
        document.getElementById('lastUpdated').textContent =
            `Auto-updated from Google Sheets \u2022 Last refresh: ${new Date().toLocaleString()}`;

        // Left table headers
        document.getElementById('kpiDate').textContent = fmtDate(latest.date);
        document.getElementById('kpiChange').textContent = `Change from ${fmtDate(prev.date)}`;
        document.getElementById('cityDate').textContent = fmtDate(latest.date);
        document.getElementById('cityChange').textContent = `Change from ${fmtDate(prev.date)}`;

        // Left table: KPI rows
        const kpiRows = [
            { name: 'Total URLs processed', val: latest.totalUrls, prev: prev.totalUrls },
            { name: 'Indexed (movers)', val: `${latest.indexed} (${latest.indexedPct}%)`, rawVal: latest.indexed, rawPrev: prev.indexed },
            { name: 'Not indexed', val: latest.notIndexed, prev: prev.notIndexed, invert: true },
            { name: 'Total Impressions', val: latest.impressions.toLocaleString(), rawVal: latest.impressions, rawPrev: prev.impressions },
            { name: 'Total Clicks', val: latest.clicks.toLocaleString(), rawVal: latest.clicks, rawPrev: prev.clicks },
            { name: 'Average Position', val: latest.avgPosition.toFixed(2), rawVal: latest.avgPosition, rawPrev: prev.avgPosition, invert: true },
            { name: 'Number of URLs in Top 3', val: latest.urlsInTop3, prev: prev.urlsInTop3 },
            { name: 'Cities in Top 20', val: latest.citiesInTop20, prev: prev.citiesInTop20 },
            { name: 'Cities Average Rank', val: latest.citiesAvgRank.toFixed(2), rawVal: latest.citiesAvgRank, rawPrev: prev.citiesAvgRank, invert: true },
        ];

        const kpiBody = document.getElementById('kpiBody');
        kpiRows.forEach(row => {
            const rv = row.rawVal !== undefined ? row.rawVal : row.val;
            const rp = row.rawPrev !== undefined ? row.rawPrev : row.prev;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="metric-name">${row.name}</td>
                <td class="metric-value">${row.val}</td>
                ${changeCell(rv, rp, row.invert)}
            `;
            kpiBody.appendChild(tr);
        });

        // Index Drop-Offs section
        const sectionRow = document.createElement('tr');
        sectionRow.className = 'section-header';
        sectionRow.innerHTML = `<td colspan="3">Index Drop-Offs</td>`;
        kpiBody.appendChild(sectionRow);

        const deindexRow = document.createElement('tr');
        deindexRow.innerHTML = `
            <td class="metric-name">Count of Deindexed URLs</td>
            <td class="metric-value">${latest.deindexedCount}</td>
            ${changeCell(latest.deindexedCount, prev.deindexedCount, true)}
        `;
        kpiBody.appendChild(deindexRow);

        if (latest.deindexedUrls && latest.deindexedUrls.length > 0) {
            latest.deindexedUrls.forEach(url => {
                const tr = document.createElement('tr');
                tr.className = 'deindexed-url';
                tr.innerHTML = `<td colspan="3"><a href="${url}" target="_blank">${url}</a></td>`;
                kpiBody.appendChild(tr);
            });
        }

        // Right table: City positions (skip cities with rank 0)
        const cityBody = document.getElementById('cityBody');
        const cityEntries = Object.entries(latest.cities).filter(([, v]) => getCityPosition(v) > 0);

        cityEntries.forEach(([city, val]) => {
            const pos = getCityPosition(val);
            const companies = getCityCompanies(val);
            const prevVal = prev.cities && prev.cities[city] !== undefined ? prev.cities[city] : 0;
            const prevPos = getCityPosition(prevVal);
            const tr = document.createElement('tr');
            if (companies.length > 0) tr.className = 'city-accordion';
            tr.innerHTML = `
                <td class="metric-name">${city} Avg Pos</td>
                <td class="metric-value">${pos.toFixed(2)}</td>
                ${prevPos > 0 ? changeCell(pos, prevPos, true) : `<td class="metric-change change-neutral">\u2194\ufe0f</td>`}
            `;
            cityBody.appendChild(tr);

            // Top 3 companies sub-rows (hidden until accordion opened)
            const companyRows = [];
            companies.forEach(comp => {
                const ctr = document.createElement('tr');
                ctr.className = 'company-row';
                const slug = comp.slug;
                const url = `https://www.localmovers.com/mobile-home-mover/${slug}`;
                ctr.innerHTML = `
                    <td class="company-name"><a href="${url}" target="_blank">${slug}</a></td>
                    <td class="metric-value company-pos">${comp.position.toFixed(2)}</td>
                    <td></td>
                `;
                cityBody.appendChild(ctr);
                companyRows.push(ctr);
            });

            if (companies.length > 0) {
                tr.addEventListener('click', () => {
                    tr.classList.toggle('open');
                    companyRows.forEach(r => r.classList.toggle('visible'));
                });
            }
        });

        // Expand All / Collapse All toggle
        const expandBtn = document.getElementById('expandAllBtn');
        let allExpanded = false;
        expandBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            allExpanded = !allExpanded;
            expandBtn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
            cityBody.querySelectorAll('.city-accordion').forEach(row => {
                if (allExpanded) row.classList.add('open');
                else row.classList.remove('open');
            });
            cityBody.querySelectorAll('.company-row').forEach(row => {
                if (allExpanded) row.classList.add('visible');
                else row.classList.remove('visible');
            });
        });

        // ============ CHARTS ============
        const labels = days.map(d => {
            const dt = new Date(d.date + 'T00:00:00');
            return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        });

        // Impressions & Clicks
        new Chart(document.getElementById('impressionsChart'), {
            type: 'line',
            data: {
                labels,
                datasets: [
                    {
                        label: 'Impressions',
                        data: days.map(d => d.impressions),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59,130,246,0.1)',
                        fill: true, tension: 0.3, yAxisID: 'y'
                    },
                    {
                        label: 'Clicks',
                        data: days.map(d => d.clicks),
                        borderColor: '#22c55e',
                        backgroundColor: 'rgba(34,197,94,0.1)',
                        fill: true, tension: 0.3, yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                interaction: { mode: 'index', intersect: false },
                plugins: { legend: { labels: { color: '#94a3b8' } } },
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                    y: { type: 'linear', position: 'left', ticks: { color: '#3b82f6' }, grid: { color: '#334155' }, title: { display: true, text: 'Impressions', color: '#3b82f6' } },
                    y1: { type: 'linear', position: 'right', ticks: { color: '#22c55e' }, grid: { drawOnChartArea: false }, title: { display: true, text: 'Clicks', color: '#22c55e' } }
                }
            }
        });

        // Average Position
        new Chart(document.getElementById('positionChart'), {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'Avg Position',
                    data: days.map(d => d.avgPosition),
                    borderColor: '#f59e0b',
                    backgroundColor: 'rgba(245,158,11,0.1)',
                    fill: true, tension: 0.3
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#94a3b8' } } },
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                    y: { reverse: true, ticks: { color: '#f59e0b' }, grid: { color: '#334155' }, title: { display: true, text: 'Position (lower = better)', color: '#f59e0b' } }
                }
            }
        });

        // Indexed vs Not Indexed
        new Chart(document.getElementById('indexChart'), {
            type: 'bar',
            data: {
                labels,
                datasets: [
                    { label: 'Indexed', data: days.map(d => d.indexed), backgroundColor: '#22c55e' },
                    { label: 'Not Indexed', data: days.map(d => d.notIndexed), backgroundColor: '#ef4444' }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: '#94a3b8' } } },
                scales: {
                    x: { stacked: true, ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                    y: { stacked: true, ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                }
            }
        });

        // City Rankings bar (only cities with position > 0)
        const activeCities = Object.entries(latest.cities).filter(([, v]) => getCityPosition(v) > 0);
        new Chart(document.getElementById('cityChart'), {
            type: 'bar',
            data: {
                labels: activeCities.map(([c]) => c),
                datasets: [{
                    label: 'Avg Position',
                    data: activeCities.map(([, v]) => getCityPosition(v)),
                    backgroundColor: activeCities.map(([, v]) => { const p = getCityPosition(v); return p <= 10 ? '#22c55e' : p <= 20 ? '#f59e0b' : '#ef4444'; }),
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                indexAxis: 'y',
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' }, title: { display: true, text: 'Avg Position', color: '#94a3b8' } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                }
            }
        });
    }

    // ============ MAIN ============
    async function loadDashboard() {
        try {
            console.log('Fetching data from Google Sheets...');
            const data = await fetchFromGoogleSheets();
            console.log(`Loaded ${data.dailySummaries.length} date sections from Google Sheets`);
            renderDashboard(data);
        } catch (err) {
            console.error('Google Sheets fetch failed:', err);
            // Fallback to local data.json
            try {
                console.log('Falling back to local data.json...');
                const resp = await fetch('data.json');
                const data = await resp.json();
                renderDashboard(data);
                document.getElementById('lastUpdated').textContent =
                    'Using cached data (Google Sheets unavailable)';
                document.getElementById('liveBadge').style.display = 'none';
            } catch (fallbackErr) {
                document.getElementById('loadingState').innerHTML =
                    `<div class="error-msg">Failed to load data. Please check that the Google Sheet is shared publicly.<br><br>Error: ${err.message}</div>`;
            }
        }
    }

    loadDashboard();
    </script>
</body>
</html>
